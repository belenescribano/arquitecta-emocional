<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulario Emocional · Arquitecta Emocional</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --marfil:#F5F0E8;--beige:#E8DFD0;--taupe:#BFB5A8;
  --dorado:#C9AA7C;--carbon:#3D3830;--carbon2:#4A443C;
  --beige2:#F0EAE0;--white:#FFFFFF;
  --sidebar-w:240px;
}
body{font-family:'Inter',sans-serif;font-weight:300;background:var(--marfil);color:var(--carbon);min-height:100vh;display:flex;flex-direction:column;}

/* ── HEADER ── */
.header{background:var(--carbon);color:var(--marfil);padding:0 28px;height:78px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.header-brand{display:flex;align-items:center;gap:12px;}
.header-tag{font-size:9px;letter-spacing:0.15em;color:var(--taupe);text-transform:uppercase;border:1px solid rgba(201,170,124,0.3);padding:3px 10px;}
.header-right{font-size:11px;color:var(--taupe);letter-spacing:0.05em;}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--carbon2);flex-shrink:0;overflow-y:auto;padding:20px 0;}
.sidebar-section{padding:0 18px;margin-bottom:24px;}
.sidebar-label{font-size:9px;letter-spacing:0.16em;color:var(--taupe);text-transform:uppercase;padding:0 2px;margin-bottom:10px;display:block;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;transition:background 0.15s;margin-bottom:2px;color:var(--taupe);font-size:12px;font-weight:400;letter-spacing:0.02em;}
.nav-item:hover{background:rgba(255,255,255,0.06);color:var(--marfil);}
.nav-item.active{background:rgba(201,170,124,0.15);color:var(--dorado);}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:0.7;}
.nav-item.active svg{opacity:1;}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sidebar-divider{height:1px;background:rgba(255,255,255,0.06);margin:4px 18px 16px;}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;padding:32px 40px;}

/* ── HOME VIEW ── */
.home-hero{margin-bottom:36px;}
.home-tag{font-size:10px;letter-spacing:0.18em;color:var(--dorado);text-transform:uppercase;margin-bottom:12px;display:block;}
.home-title{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:400;line-height:1.15;color:var(--carbon);margin-bottom:10px;}
.home-title em{color:var(--dorado);}
.home-sub{font-size:13px;color:var(--carbon2);line-height:1.8;max-width:560px;}
.home-rule{width:40px;height:1px;background:var(--dorado);margin:20px 0;}

.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:40px;}
.cat-card{background:var(--white);border:1px solid var(--beige);border-radius:10px;padding:22px;cursor:pointer;transition:all 0.18s;position:relative;overflow:hidden;}
.cat-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--card-color);}
.cat-card:hover{border-color:var(--dorado);transform:translateY(-2px);}
.cat-card-icon{font-size:22px;margin-bottom:12px;color:var(--card-color);}
.cat-card-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--carbon);margin-bottom:6px;}
.cat-card-desc{font-size:11.5px;color:var(--taupe);line-height:1.65;}
.cat-card-count{position:absolute;top:14px;right:14px;font-size:10px;background:var(--beige);color:var(--taupe);padding:3px 9px;border-radius:20px;}

.home-quote{background:var(--carbon);border-radius:10px;padding:28px 32px;margin-top:8px;}
.home-quote p{font-family:'Cormorant Garamond',serif;font-size:18px;font-style:italic;color:var(--marfil);line-height:1.7;margin-bottom:10px;}
.home-quote cite{font-size:11px;color:var(--taupe);letter-spacing:0.05em;}

/* ── CATEGORY VIEW ── */
.cat-header{margin-bottom:28px;}
.cat-header-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.back-btn{background:none;border:none;cursor:pointer;color:var(--taupe);font-size:12px;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px;padding:0;transition:color 0.15s;}
.back-btn:hover{color:var(--dorado);}
.cat-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:400;color:var(--carbon);}
.cat-desc-text{font-size:13px;color:var(--taupe);line-height:1.7;margin-top:4px;}
.cat-rule{width:32px;height:1px;background:var(--dorado);margin:14px 0;}

.exercises-list{display:flex;flex-direction:column;gap:10px;}
.ex-card{background:var(--white);border:1px solid var(--beige);border-radius:10px;overflow:hidden;transition:border-color 0.15s;}
.ex-card:hover{border-color:var(--taupe);}
.ex-card.open{border-color:var(--dorado);}
.ex-header{display:flex;align-items:center;gap:16px;padding:18px 22px;cursor:pointer;}
.ex-num{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--dorado);opacity:0.5;min-width:24px;line-height:1;}
.ex-meta{flex:1;}
.ex-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:500;color:var(--carbon);margin-bottom:3px;}
.ex-tags{display:flex;gap:6px;align-items:center;}
.ex-tag{font-size:10px;letter-spacing:0.06em;padding:2px 9px;border-radius:20px;background:var(--beige);color:var(--taupe);}
.ex-tag.tipo{background:rgba(201,170,124,0.12);color:var(--dorado);}
.ex-toggle{color:var(--taupe);transition:transform 0.2s;font-size:16px;}
.ex-card.open .ex-toggle{transform:rotate(180deg);}

.ex-body{display:none;border-top:1px solid var(--beige);}
.ex-card.open .ex-body{display:block;}
.ex-body-inner{padding:24px 28px;}

.ex-intro{font-size:13px;color:var(--carbon2);line-height:1.85;margin-bottom:22px;font-style:italic;border-left:2px solid var(--dorado);padding-left:14px;}

.steps-title{font-size:10px;letter-spacing:0.15em;color:var(--dorado);text-transform:uppercase;margin-bottom:14px;}
.steps-list{list-style:none;display:flex;flex-direction:column;gap:0;}
.step-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--beige2);}
.step-item:last-child{border-bottom:none;}
.step-num{min-width:22px;height:22px;border-radius:50%;background:var(--carbon);color:var(--dorado);font-size:10px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13px;color:var(--carbon2);line-height:1.75;}

.reflexion-box{background:var(--carbon);border-radius:8px;padding:18px 20px;margin-top:22px;}
.reflexion-label{font-size:9px;letter-spacing:0.15em;color:var(--dorado);text-transform:uppercase;margin-bottom:8px;display:block;}
.reflexion-text{font-family:'Cormorant Garamond',serif;font-size:15px;font-style:italic;color:var(--marfil);line-height:1.7;}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:24px;}
.search-input{width:100%;background:var(--white);border:1px solid var(--beige);border-radius:8px;padding:10px 16px 10px 38px;font-size:13px;font-family:'Inter',sans-serif;color:var(--carbon);outline:none;transition:border-color 0.15s;}
.search-input:focus{border-color:var(--dorado);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--taupe);font-size:15px;}

/* ── FAVORITOS ── */
.fav-btn{background:none;border:none;cursor:pointer;color:var(--taupe);transition:color 0.15s;padding:4px;margin-left:auto;}
.fav-btn:hover,.fav-btn.active{color:var(--dorado);}
.fav-btn svg{width:14px;height:14px;}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--taupe);}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:0.4;}
.empty p{font-size:13px;}

/* ── MOBILE ── */
.mobile-nav-btn{display:none;background:none;border:none;cursor:pointer;color:var(--marfil);font-size:20px;padding:4px;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:90;}
@media(max-width:680px){
  .sidebar{position:fixed;left:-260px;top:78px;bottom:0;z-index:95;transition:left 0.25s;overflow-y:auto;}
  .sidebar.open{left:0;}
  .sidebar-overlay.show{display:block;}
  .mobile-nav-btn{display:block;}
  .main{padding:20px 18px;}
  .cats-grid{grid-template-columns:1fr 1fr;}
  .home-title{font-size:28px;}
}
@media(max-width:400px){
  .cats-grid{grid-template-columns:1fr;}
}

.pdf-btn{display:inline-flex;align-items:center;gap:6px;margin-top:18px;padding:9px 18px;background:var(--carbon);color:var(--dorado);font-family:'Inter',sans-serif;font-size:11px;font-weight:400;letter-spacing:0.08em;text-transform:uppercase;border:1px solid rgba(201,170,124,0.35);border-radius:4px;cursor:pointer;text-decoration:none;transition:background 0.15s,border-color 0.15s;}
.pdf-btn:hover{background:#2e2922;border-color:var(--dorado);}
.pdf-btn svg{flex-shrink:0;}


/* ── WHEEL (home hero) ── */
.wheel-wrap{display:flex;flex-direction:column;align-items:center;margin:4px 0 36px;}
.wheel-svg{width:100%;max-width:504px;height:auto;}
.wheel-seg{cursor:pointer;transition:opacity 0.15s;}
.wheel-seg:hover{opacity:0.8;}
.wheel-hint{font-size:11px;color:var(--taupe);margin-top:4px;text-align:center;letter-spacing:0.02em;}

/* ── FAMILIA HEADER (reuses cat-header pattern) ── */
.fam-intro{font-size:13px;color:var(--carbon2);line-height:1.8;margin:14px 0 30px;max-width:46em;}

.subsection-label{font-size:9px;letter-spacing:0.15em;color:var(--dorado);text-transform:uppercase;margin:0 0 10px;display:block;}

/* ── VARIANT SCALE ── */
.variant-scale{display:flex;flex-direction:column;margin-bottom:30px;}
.variant-row{display:grid;grid-template-columns:30px 1fr;gap:14px;padding:13px 0;border-bottom:1px solid var(--beige);align-items:flex-start;}
.variant-row:last-child{border-bottom:none;}
.variant-level{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:var(--white);flex-shrink:0;margin-top:1px;}
.variant-word{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--carbon);margin-bottom:3px;}
.variant-matiz{font-size:12px;color:var(--taupe);line-height:1.65;}

/* ── BODY MAP ── */
.bodymap-grid{display:grid;grid-template-columns:130px 1fr;gap:28px;margin-bottom:30px;align-items:start;}
.bodymap-svg{width:100%;}
.bodymap-col{display:flex;flex-direction:column;gap:16px;}
.bodymap-block-label{font-size:9px;letter-spacing:0.15em;color:var(--dorado);text-transform:uppercase;margin-bottom:6px;display:block;}
.bodymap-text{font-size:13px;color:var(--carbon2);line-height:1.8;}
@media(max-width:560px){.bodymap-grid{grid-template-columns:90px 1fr;gap:18px;}}

.extra-words{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:30px;}
.extra-word{font-size:11.5px;color:var(--carbon2);border:1px solid var(--beige);padding:6px 13px;background:var(--white);}

/* ── NEXT STEP NOTE ── */
.next-step-note{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13.5px;color:var(--dorado);text-align:center;margin-top:14px;}

@media(max-width:680px){.header-right{display:none;}}

/* ── BRAND CONSISTENCY FIX: el sitio principal usa esquinas rectas (border-radius:0) ── */
.cat-card,.ex-card,.search-input,.pdf-btn,.reflexion-box,.home-quote,.fam-card{border-radius:0 !important;}
.cat-card-count,.ex-tag{border-radius:2px;}
.cat-card::before{width:3px;}

</style>
</head>

ra": "Asco profundo", "nivel": 4, "matiz": "La forma más intensa: algo que se siente como una contradicción total de tus valores."}], "cuerpo": "Una leve náusea, el cuerpo se retrae hacia atrás o hacia adentro, las ganas de poner distancia física. A veces se siente en la garganta, a veces en el estómago.", "detona": "Algo que se siente impuro o incorrecto, una contradicción de tus valores, o una traición a la confianza que habías puesto en algo o alguien.", "zonas": ["estomago", "garganta"], "extra": ["Desprecio", "Aversión", "Desdén", "Hastío", "Desconfianza", "Repugnancia"], "ejercicio": {"id": "ej-asco", "titulo": "Nombrar el matiz exacto de tu rechazo", "duracion": "8 min", "tipo": "Precisión emocional", "intro": "El rechazo casi nunca se nombra — se actúa, en silencio, alejándose. Decirlo con precisión te devuelve la información de qué valor estaba siendo contradicho.", "pasos": ["Piensa en algo —una situación, una conducta, una conversación— que te haya generado distancia.", "Ponle una intensidad del 1 al 10.", "Recorre las cuatro variantes y elige la más exacta.", "Ubica en tu cuerpo dónde se siente: ¿estómago, garganta, en la piel?", "Completa: «No es solo que no me gustó — es [variante elegida], y la siento en [zona].»"], "reflexion": "¿Qué valor tuyo estaba siendo contradicho en ese momento?"}}, {"id": "sorpresa", "nombre": "Sorpresa", "color": "#A89A6E", "desc": "Cuando algo inesperado interrumpe lo que esperabas.", "variantes": [{"palabra": "Desconcierto", "nivel": 1, "matiz": "Una pausa breve mientras la mente reorganiza la información."}, {"palabra": "Sorpresa", "nivel": 2, "matiz": "Lo inesperado se nombra con claridad: esto no era lo que esperaba."}, {"palabra": "Asombro", "nivel": 3, "matiz": "Sorpresa con apertura — lo inesperado se recibe con curiosidad, no con resistencia."}, {"palabra": "Conmoción", "nivel": 4, "matiz": "La forma más intensa. El cuerpo entero se detiene antes de poder procesar lo que pasó."}], "cuerpo": "Una pausa breve en la re let favorites = JSON.parse(localStorage.getItem('ae_vocab_favs')||'[]');
let currentView = 'home';
let currentFam = null;

function saveFavs(){localStorage.setItem('ae_vocab_favs',JSON.stringify(favorites));}
function isFav(id){return favorites.includes(id);}
function toggleFav(id,e){
  if(e) e.stopPropagation();
  favorites = isFav(id)?favorites.filter(f=>f!==id):[...favorites,id];
  saveFavs();
  renderView();
}

function setNavActive(id){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+id);
  if(el)el.classList.add('active');
}

function showView(v){
  currentView=v; currentFam=null;
  setNavActive(v);
  renderView();
  closeMobileNav();
  window.scrollTo(0,0);
}

function showFamilia(famId){
  currentView='familia'; currentFam=famId;
  setNavActive(famId);
  renderView();
  closeMobileNav();
  window.scrollTo(0,0);
}

function renderView(){
  const main=document.getElementById('main-content');
  if(currentView==='home') main.innerHTML=renderHome();
  else if(currentView==='familia') main.innerHTML=renderFamilia(currentFam);
  else if(currentView==='search') main.innerHTML=renderSearch('');
  else if(currentView==='favoritos') main.innerHTML=renderFavoritos();
}

/* ───────────────────────── WHEEL ───────────────────────── */

const WHEEL_ORDER = ["enojo", "miedo", "asco", "sorpresa", "alegria", "tristeza"];

function polarXY(cx,cy,r,angleDeg){
  const a=(angleDeg-90)*Math.PI/180;
  return {x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)};
}
function arcSegmentPath(cx,cy,rOuter,rInner,startAngle,endAngle){
  const p1=polarXY(cx,cy,rOuter,endAngle);
  const p2=polarXY(cx,cy,rOuter,startAngle);
  const p3=polarXY(cx,cy,rInner,startAngle);
  const p4=polarXY(cx,cy,rInner,endAngle);
  const largeArc=(endAngle-startAngle)>180?1:0;
  return `M ${p1.x.toFixed(2)} ${p1.y.toFixed(2)} A ${rOuter} ${rOuter} 0 ${largeArc} 0 ${p2.x.toFixed(2)} ${p2.y.toFixed(2)} L ${p3.x.toFixed(2)} ${p3.y.toFixed(2)} A ${rInner} ${rInner} 0 ${largeArc} 1 ${p4.x.toFixed(2)} ${p4.y.toFixed(2)} Z`;
}

/* Mide el ancho real del texto para garantizar que cada palabra quepa
   dentro de su propio casillero — nunca se sale, nunca se recorta. */
const _measureCanvas = document.createElement('canvas');
const _measureCtx = _measureCanvas.getContext('2d');
function fitFontSize(text, maxWidth, maxSize, minSize){
  for(let size=maxSize; size>=minSize; size-=0.5){
    _measureCtx.font = `500 ${size}px Inter, sans-serif`;
    if(_measureCtx.measureText(text).width <= maxWidth) return size;
  }
  return minSize;
}

/* Texto radial: corre a lo largo del radio, siempre derecho (nunca al revés),
   y su tamaño se calcula para que quepa entero en el ancho de su anillo. */
function radialLabel(cx,cy,rInner,rOuter,mid,text,fill,maxSize,minSize,padding){
  const r=(rInner+rOuter)/2;
  const bandWidth=(rOuter-rInner)-padding;
  const size=fitFontSize(text,bandWidth,maxSize,minSize);
  const p=polarXY(cx,cy,r,mid);
  let rot=mid-90;
  if(mid>180) rot=mid-90+180;
  return `<text x="${p.x.toFixed(2)}" y="${p.y.toFixed(2)}" transform="rotate(${rot.toFixed(2)} ${p.x.toFixed(2)} ${p.y.toFixed(2)})" text-anchor="middle" dominant-baseline="central" font-family="Inter, sans-serif" font-size="${size}" font-weight="500" fill="${fill}" style="pointer-events:none">${text}</text>`;
}

/* Texto horizontal (tangencial): para anillos con mucho espacio angular,
   donde el límite es el ancho del arco, no el espesor del anillo. */
function tangentialLabel(cx,cy,r,startAngle,endAngle,text,fill,maxSize,minSize){
  const angleRad=(endAngle-startAngle)*Math.PI/180;
  const arcWidth=r*angleRad*0.92;
  const size=fitFontSize(text,arcWidth,maxSize,minSize);
  const mid=(startAngle+endAngle)/2;
  const p=polarXY(cx,cy,r,mid);
  return `<text x="${p.x.toFixed(2)}" y="${p.y.toFixed(2)}" text-anchor="middle" dominant-baseline="central" font-family="Inter, sans-serif" font-size="${size}" font-weight="500" fill="${fill}" style="pointer-events:none">${text}</text>`;
}

function renderWheel(){
  const fams=WHEEL_ORDER.map(id=>DATA.familias.find(f=>f.id===id)).filter(Boolean);
  const n=fams.length;
  const cx=235,cy=235;
  const rHole=44, r0=92, r1=158, r2=222;
  const step=360/n;
  let html='';
  fams.forEach((f,i)=>{
    const start=i*step, end=(i+1)*step, mid=(start+end)/2;

    /* ring 0 — nombre de la familia, en el mismo sentido radial que su casillero */
    html+=`<path class="wheel-seg" d="${arcSegmentPath(cx,cy,r0,rHole,start,end)}" fill="${f.color}" stroke="#F5F0E8" stroke-width="2" onclick="showFamilia('${f.id}')"></path>`;
    html+=radialLabel(cx,cy,rHole,r0,mid,f.nombre,'#FFFFFF',14,8,14);

    /* ring 1 — 4 variantes */
    const vStep=step/f.variantes.length;
    f.variantes.forEach((v,j)=>{
      const vs=start+j*vStep, ve=start+(j+1)*vStep, vm=(vs+ve)/2;
      html+=`<path class="wheel-seg" d="${arcSegmentPath(cx,cy,r1,r0,vs,ve)}" fill="${f.color}" opacity="0.82" stroke="#F5F0E8" stroke-width="1.3" onclick="showFamilia('${f.id}')"></path>`;
      html+=radialLabel(cx,cy,r0,r1,vm,v.palabra,'#3D3830',10.5,6.5,14);
    });

    /* ring 2 — vocabulario extendido */
    const eStep=step/f.extra.length;
    f.extra.forEach((w,k)=>{
      const es=start+k*eStep, ee=start+(k+1)*eStep, em=(es+ee)/2;
      html+=`<path class="wheel-seg" d="${arcSegmentPath(cx,cy,r2,r1,es,ee)}" fill="${f.color}" opacity="0.42" stroke="#F5F0E8" stroke-width="1" onclick="showFamilia('${f.id}')"></path>`;
      html+=radialLabel(cx,cy,r1,r2,em,w,'#3D3830',9.5,6,12);
    });
  });
  return `
    <div class="wheel-wrap">
      <svg class="wheel-svg" viewBox="0 0 470 470">
        ${html}
        <circle cx="${cx}" cy="${cy}" r="${rHole-4}" fill="#FFFFFF"></circle>
        <text x="${cx}" y="${cy-9}" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-style="italic" font-size="13" fill="#3D3830">La rueda de</text>
        <text x="${cx}" y="${cy+12}" text-anchor="middle" font-family="'Cormorant Garamond',serif" font-style="italic" font-size="13" fill="#C9AA7C">tus emociones</text>
      </svg>
      <p class="wheel-hint">Toca cualquier capa para explorar esa familia — del centro hacia afuera, cada anillo es más específico.</p>
    </div>`;
}

/* ───────────────────────── BODY MAP ───────────────────────── */

const SILHOUETTE=`
  <path d="M40,36 L80,36 L86,58 Q88,92 82,130 L38,130 Q32,92 34,58 Z" fill="#F0EAE0" stroke="#BFB5A8" stroke-width="1"></path>
  <circle cx="60" cy="20" r="14" fill="#F0EAE0" stroke="#BFB5A8" stroke-width="1"></circle>
  <path d="M40,40 Q24,60 20,98" fill="none" stroke="#BFB5A8" stroke-width="1"></path>
  <path d="M80,40 Q96,60 100,98" fill="none" stroke="#BFB5A8" stroke-width="1"></path>
`;

function renderBodyMap(zonas,color){
  let dots='';
  zonas.forEach((zKey,i)=>{
    const z=ZONAS[zKey];
    if(!z) return;
    const r = i===0?11:7;
    const op = i===0?0.85:0.4;
    dots+=`<circle cx="${z.x}" cy="${z.y}" r="${r}" fill="${color}" opacity="${op}"></circle>`;
  });
  return `<svg class="bodymap-svg" viewBox="0 0 120 145">${SILHOUETTE}${dots}</svg>`;
}

function zoneLabels(zonas){
  return zonas.map(zKey=>ZONAS[zKey]?ZONAS[zKey].label:'').filter(Boolean).join(' · ');
}

function renderHome(){
  const fams=DATA.familias;
  const cards=fams.map(f=>`
    <div class="cat-card fam-card" onclick="showFamilia('${f.id}')" style="--card-color:${f.color}">

      <div class="cat-card-name">${f.nombre}</div>

  return `
    <div class="home-hero">

      <div class="home-rule"></div>
      <p class="home-sub">Seis familias emocionales, sus variantes exactas y dónde se sienten en el cuerpo — para dejar de decir «estoy mal» y empezar a saber, con precisión, qué es lo que sientes.</p>
    </div>

      <p>"La claridad emocional cambia la identidad. Y cuando la identidad cambia, cambia la vida."</p>

    </div>
    <p class="next-step-note">→ Tu próximo paso natural, cuando ya nombras con precisión: Escribir para encontrarte.</p>`;
}

/* ───────────────────────── FAMILIA ───────────────────────── */

function renderEjercicioCard(ex,famId,color){
  const fav=isFav(famId);
  const steps=ex.pasos.map((p,i)=>`<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${p}</span></li>`).join('');
  return `
    <div class="ex-card" id="ex-${famId}">
      <div class="ex-header" onclick="toggleEx('${famId}')">
        <div class="ex-meta">
          <div class="ex-title">${ex.titulo}</div>
          <div class="ex-tags">
            <span class="ex-tag tipo">${ex.tipo}</span>
            <span class="ex-tag">${ex.duracion}</span>
          </div>
        </div>
        <button class="fav-btn ${fav?'active':''}" onclick="toggleFav('${famId}',event)" aria-label="Favorito">
          <svg viewBox="0 0 24 24" fill="${fav?'currentColor':'none'}" stroke="currentColor" stroke-width="1.8"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
        <span class="ex-toggle">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </div>
      <div class="ex-body">
        <div class="ex-body-inner">
          <p class="ex-intro">${ex.intro}</p>
          <div class="steps-title">Cómo hacerlo</div>
          <ul class="steps-list">${steps}</ul>
          <div class="reflexion-box">
            <span class="reflexion-label">Pregunta de cierre</span>
            <p class="reflexion-text">${ex.reflexion}</p>
          </div>
          ${PDF_DATA[famId] ? `<a class="pdf-btn" href="data:application/pdf;base64,${PDF_DATA[famId]}" download="AE_vocabulario_${famId}.pdf"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Descargar hoja de trabajo</a>` : ''}
        </div>
      </div>
    </div>`;
}

function toggleEx(id){
  const card=document.getElementById('ex-'+id);
  card.classList.toggle('open');
}

function renderFamilia(famId){
  const f=DATA.familias.find(x=>x.id===famId);
  if(!f) return '<div class="empty"><p>Familia no encontrada.</p></div>';
  const variantRows=f.variantes.map(v=>`
    <div class="variant-row">
      <div class="variant-level" style="background:${f.color}">${v.nivel}</div>
      <div>
        <div class="variant-word">${v.palabra}</div>
        <div class="variant-matiz">${v.matiz}</div>
      </div>
    </div>`).join('');
  return `
    <div class="cat-header">
      <button class="back-btn" onclick="showView('home')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Todas las familias
      </button>
      <div class="cat-rule" style="background:${f.color}"></div>
      <h2 class="cat-title">${f.nombre}</h2>
      <p class="cat-desc-text">${f.desc}</p>
    </div>

    <span class="subsection-label">Las cuatro variantes</span>
    <div class="variant-scale">${variantRows}</div>

    <span class="subsection-label">Vocabulario extendido de ${f.nombre.toLowerCase()}</span>
    <div class="extra-words">${f.extra.map(w=>`<span class="extra-word" style="border-color:${f.color}">${w}</span>`).join('')}</div>

    <span class="subsection-label">Dónde se siente en el cuerpo</span>
    <div class="bodymap-grid">
      ${renderBodyMap(f.zonas,f.color)}
      <div class="bodymap-col">
        <p class="bodymap-text">${f.cuerpo}</p>
        <p class="bodymap-text"><strong style="font-family:'Inter',sans-serif;font-weight:500;color:var(--carbon)">Qué lo activa —</strong> ${f.detona}</p>
      </div>
    </div>

    <span class="subsection-label">Ejercicio de precisión</span>
    ${renderEjercicioCard(f.ejercicio,f.id,f.color)}`;
}

/* ───────────────────────── SEARCH ───────────────────────── */

function buildSearchIndex(){
  return DATA.familias.map(f=>{
    const text=[f.nombre,f.desc,f.cuerpo,f.detona,
      ...f.variantes.map(v=>v.palabra+' '+v.matiz),
      ...f.extra,
      f.ejercicio.titulo, f.ejercicio.intro
    ].join(' ').toLowerCase();
    return {...f, _text:text};
  });
}

function resultCard(f){
  return `
    <div class="cat-card fam-card" onclick="showFamilia('${f.id}')" style="--card-color:${f.color}">
      <span class="cat-card-count">${f.variantes.length} variantes</span>
      <div class="cat-card-name">${f.nombre}</div>
      <div class="cat-card-desc">${f.desc}</div>
    </div>`;
}

function renderSearch(query){
  const all=buildSearchIndex();
  const filtered=query?all.filter(f=>f._text.includes(query.toLowerCase())):all;
  const list=filtered.length?`<div class="cats-grid" id="search-results">${filtered.map(resultCard).join('')}</div>`
    :`<div class="empty"><div class="empty-icon">✦</div><p>No hay familias o variantes que coincidan con "${query}"</p></div>`;
  return `
    <div style="margin-bottom:20px">
      <span class="home-tag">Buscar variante</span>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--carbon);margin-bottom:16px">Busca por emoción o palabra exacta</h2>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="search-input" type="text" placeholder="Por ejemplo: frustración, pecho, duelo..." value="${query}" oninput="updateSearch(this.value)" autofocus>
    </div>
    ${list}`;
}

function updateSearch(q){
  const all=buildSearchIndex();
  const filtered=q?all.filter(f=>f._text.includes(q.toLowerCase())):all;
  const list=filtered.length?filtered.map(resultCard).join(''):
    `<div class="empty"><div class="empty-icon">✦</div><p>No hay familias o variantes que coincidan con "${q}"</p></div>`;
  const wrap=document.getElementById('search-results');
  if(filtered.length){
    if(wrap) wrap.innerHTML=list;
    else document.querySelector('.search-wrap').insertAdjacentHTML('afterend', `<div class="cats-grid" id="search-results">${list}</div>`);
  } else {
    if(wrap) wrap.outerHTML=list;
    else document.querySelector('.search-wrap').insertAdjacentHTML('afterend', list);
  }
}

/* ───────────────────────── FAVORITOS ───────────────────────── */

function renderFavoritos(){
  const all=DATA.familias;
  const favs=all.filter(f=>isFav(f.id));
  const list=favs.length?`<div class="cats-grid">${favs.map(resultCard).join('')}</div>`
    :`<div class="empty" style="padding-top:80px">
        <div class="empty-icon">✦</div>
        <p>Aún no tienes familias guardadas.<br>Marca el ícono de estrella dentro de cualquier ejercicio.</p>
      </div>`;
  return `
    <div style="margin-bottom:20px">
      <span class="home-tag">Mis familias guardadas</span>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:400;color:var(--carbon)">Favoritos</h2>
    </div>
    ${list}`;
}

  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeMobileNav(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

renderView();
